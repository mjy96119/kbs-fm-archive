<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출발 FM 선곡표 아카이브</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 10px 0; cursor: pointer; border-radius: 8px; font-size: 14px; position: relative; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .day.has-data::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #3498db; border-radius: 50%; }
        .day.selected { background: #3498db !important; color: white !important; }
        .song-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .like-btn { font-size: 20px; cursor: pointer; margin-right: 12px; color: #ccc; transition: 0.2s; }
        .like-btn.active { color: var(--accent); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 14px; cursor: pointer; }
        .btn-month { border: none; background: #eee; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .today-mark { border: 2px solid var(--primary) !important; font-weight: bold; }
    </style>
</head>
<body>
    <header id="header-title">출발 FM과 함께</header>
    <div class="container" id="main-content">
        <div class="card" id="calendar-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; font-weight:bold;">
                <button class="btn-month" onclick="changeMonth(-1)">◀</button>
                <div id="month-label" style="font-size: 1.1rem;"></div>
                <button class="btn-month" onclick="changeMonth(1)">▶</button>
                <button onclick="goToToday()" style="font-size:12px; padding:4px 8px; border-radius:5px; border:1px solid #ccc; background:white; cursor:pointer;">오늘</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
        </div>
        <div id="song-list-container"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="showView('home')">📅 달력</div>
        <div class="nav-item" onclick="showView('likes')">❤️ 보관함</div>
    </nav>

    <script>
        let playlistData = {};
        let viewDate = new Date(); 
        let currentView = 'home';

        // 데이터 로드 및 초기화
        fetch('./data.json?v=' + Date.now()).then(res => res.json()).then(data => {
            playlistData = data;
            goToToday(); // 시작하자마자 오늘 날짜로
        }).catch(() => {
            document.getElementById('song-list-container').innerHTML = 
                "<p style='text-align:center; color:#999; margin-top:20px;'>데이터를 불러오는 중입니다...</p>";
            renderCalendar();
        });

        function getTodayStr() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function goToToday() {
            viewDate = new Date();
            renderCalendar();
            const todayStr = getTodayStr();
            selectDateByStr(todayStr);
        }

        function renderCalendar() {
            const grid = document.getElementById('cal-grid');
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const todayStr = getTodayStr();
            
            document.getElementById('month-label').innerText = `${year}년 ${month + 1}월`;
            grid.innerHTML = '';

            const daysHeader = ['월', '화', '수', '목', '금', '토', '일'];
            daysHeader.forEach(d => {
                const dayHead = document.createElement('div');
                dayHead.style.fontWeight = 'bold'; dayHead.style.color = '#888'; dayHead.innerText = d;
                grid.appendChild(dayHead);
            });

            let firstDay = new Date(year, month, 1).getDay();
            firstDay = (firstDay === 0) ? 6 : firstDay - 1; 
            const lastDate = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let i = 1; i <= lastDate; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const div = document.createElement('div');
                div.className = 'day' + (playlistData[dateStr] ? ' has-data' : '');
                if (dateStr === todayStr) div.classList.add('today-mark');
                div.innerText = i;
                div.id = 'day-' + dateStr;
                div.onclick = () => selectDate(dateStr, div);
                grid.appendChild(div);
            }
        }

        function selectDateByStr(dateStr) {
            const el = document.getElementById('day-' + dateStr);
            if (el) selectDate(dateStr, el);
            else renderSongs(playlistData[dateStr] || [], dateStr);
        }

        function selectDate(date, el) {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            if (el) el.classList.add('selected');
            renderSongs(playlistData[date] || [], date);
        }

        function renderSongs(songs, titleText) {
            const container = document.getElementById('song-list-container');
            if (!songs || songs.length === 0) {
                container.innerHTML = `<p style='text-align:center; padding:20px;'>${titleText} 선곡표가 없습니다.</p>`;
                return;
            }
            const likes = JSON.parse(localStorage.getItem('fm-likes') || '[]');
            container.innerHTML = `<h3 style='margin-left:5px;'>${titleText}</h3>` + songs.map(s => {
                const isLiked = likes.some(l => l.title === s.title);
                return `
                <div class="card song-item">
                    <span class="like-btn ${isLiked?'active':''}" onclick="event.stopPropagation(); toggleLike('${s.title.replace(/'/g, "\\'")}', '${s.artist.replace(/'/g, "\\'")}')">${isLiked?'❤️':'♡'}</span>
                    <div>
                        <div style="font-weight:600;">${s.title}</div>
                        <div style="font-size:12px; color:#666;">${s.artist}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function changeMonth(diff) {
            viewDate.setMonth(viewDate.getMonth() + diff);
            renderCalendar();
        }

        function toggleLike(title, artist) {
            let likes = JSON.parse(localStorage.getItem('fm-likes') || '[]');
            if (likes.some(l => l.title === title)) {
                likes = likes.filter(l => l.title !== title);
            } else {
                likes.push({title, artist});
            }
            localStorage.setItem('fm-likes', JSON.stringify(likes));
            
            if (currentView === 'likes') showView('likes');
            else {
                const h3 = document.querySelector('#song-list-container h3');
                if (h3) selectDateByStr(h3.innerText);
            }
        }

        function showView(view) {
            currentView = view;
            const container = document.getElementById('song-list-container');
            const calCard = document.getElementById('calendar-card');
            if (view === 'likes') {
                calCard.style.display = 'none';
                const likes = JSON.parse(localStorage.getItem('fm-likes') || '[]');
                renderSongs(likes, '❤️ 나의 보관함');
            } else {
                calCard.style.display = 'block';
                goToToday();
            }
        }
    </script>
</body>
</html>
