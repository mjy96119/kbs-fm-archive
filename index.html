<script>
    // ... (기존 style과 기본 구조는 유지)

    function renderCalendar() {
        const grid = document.getElementById('cal-grid');
        const now = new Date(); // 현재 시점 기준
        const year = now.getFullYear();
        const month = now.getMonth();
        
        document.getElementById('month-label').innerText = `${year}년 ${month + 1}월`;
        grid.innerHTML = '';

        // 요일 헤더 (월~일 순서)
        const days = ['월', '화', '수', '목', '금', '토', '일'];
        days.forEach(d => {
            const dayHead = document.createElement('div');
            dayHead.style.fontWeight = 'bold';
            dayHead.style.color = '#888';
            dayHead.innerText = d;
            grid.appendChild(dayHead);
        });

        // 1일의 요일 계산 (0:일, 1:월 ... 6:토)
        let firstDay = new Date(year, month, 1).getDay();
        // 월요일 시작으로 변환 (일요일(0)을 6으로, 나머지는 -1)
        firstDay = (firstDay === 0) ? 6 : firstDay - 1;

        const lastDate = new Date(year, month + 1, 0).getDate();

        // 1일 전까지 빈칸 채우기
        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        // 날짜 채우기
        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const div = document.createElement('div');
            div.className = 'day' + (playlistData[dateStr] ? ' has-data' : '');
            div.innerText = i;
            div.onclick = () => selectDate(dateStr, div);
            grid.appendChild(div);
        }
    }
</script>
